<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Nyaya Revolution</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#eef4ff,#dfe9f7);
    min-height:100vh;
    display:flex;
    align-items:center;
}

.login-card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.logo{
    width:80px;
}

.btn-primary{
    background:#0d6efd;
}

.btn-primary:hover{
    background:#0b5ed7;
}
</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card login-card">

<div class="card-body p-5 text-center">

<img src="../icons/logo1.png" class="logo mb-3" alt="Logo">

<h2 class="fw-bold">Nyaya Revolution</h2>

<p class="text-muted mb-4">
Login to explore Indian Laws, Rights and Legal Resources.
</p>

<form>

<div class="mb-3 text-start">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3 text-start">
<label class="form-label">Password</label>
<input type="password" class="form-control" placeholder="Enter your password" required>
</div>

<div class="d-flex justify-content-between mb-3">

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Remember Me
</label>
</div>

<a href="#" class="text-decoration-none">
Forgot Password?
</a>

</div>

<button class="btn btn-primary w-100">
Login
</button>

<hr>

<p class="mb-2">
Don't have an account?
</p>

<a href="#" class="btn btn-outline-primary w-100">
Create Account
</a>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
